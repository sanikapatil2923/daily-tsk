<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body style="background-color: bisque;">
    <center><h1><u>application form</u></h1></center>
    <center>
        <fieldset>
            <label for="fullname">fullname:</label>
                <input type="text">
                <br><br>
            <label for="email">email:</label>
                <input type="email">
                <br><br>
            <label for="contact">contact:</label>
                <input type="tel">
                <br><br>
            <label for="password">password:</label>
                <input type="password">
                <br><br>
            <label for="age">age:</label>
                <input type="age">
                <br><br>    
            <label for="address">address:</label>
            <textarea cols="10" rows="5"></textarea>
                <input type="address">
                <br><br>       
            <label for="gender">gender:-</label>
            <input type="radio" name="gender" values="female">female   
            <input type="radio" name="gender" values="male">male   
            <input type="radio" nane="gender" values="other">other
            <br><br>
            <label for="course">course:-</label>
            <input type="checkbox" name="course" values="python">python 
            <input type="checkbox" name="course" values="java">java
            <input type="checkbox" name="course" values="sql">sql
            <input type="checkbox" name="course" values="testing">testing 
            <br><br>
            <label for="photo">photo:-</label>
            <input type="file">
            <br><br>
            <button>submit</button> 
            <button>reset</button> 
            <a href="sc.html">Next</a>     
        </fieldset>
    </center>
</body>
</html>
