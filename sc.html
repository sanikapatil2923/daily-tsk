<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body style="background-color: aquamarine;">
 <bgcolor="lightblue">
    <center><h1><u>Scholarship Form</u></h1></center>
   <center>
    <fieldset>
     <form action="">
       <center><h3><u>Personal Details</u></h3></center> 
        <br>
            <label for="fullname">Fullname:</label>
            <input type="text">
        <br><br>
          <label for="marital status">Marital Status</label>
        <input type="radio" name="marital stetus" value="married"> married      
        <input type="radio" name="marital stetus" value="unmarried"> unmarried  
         <br><br>
         <label for="date of birth">Date Of birth:</label>
        <input type="birthdate">
        <br><br>
          <center> <h3><u>Contact Details</u></h3></center>
          <br>
          <label for="contact">Contact:</label>
        <input type="tel">
        <br><br>
          <label for="email">Email</label>
        <input type="email">
        <br><br>
         <label for="address">Address</label>
         <textarea cols="10" rows="5"></textarea>
        <input type="address">
        <br><br>
     <center> <h3><u>Education Details</u></h3></center>
        <br>
          <label for="college/university name">college/university name</label>
        <input type="college/university">
        <br><br>
        <label for="degree type">degree type</label>
        <input type="radio" name="degree type" value="undergraduate">undergraduate
         <input type="radio" name="degree type" value="postgraduate">postgraduate
        <br><br>
        <label for="passing year">passing year</label>
        <input type="passing year">
        <br><br>
         <label for="last semester grade">last semester grade</label>
        <input type="last semester grade">
        <br><br>
        <button>submit</button>
        <button>reset</button>
        
     </form>
    </fieldset>
    </center>  
</body>
</html>
